# ==========================================
# Server Configuration
# ==========================================
server.port=${SERVER_PORT:8080}

# ==========================================
# Relational Database Configuration (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bankmind}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:bankmind_user}
spring.datasource.password=${DB_PASSWORD:bankmind_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Flyway Migration Configuration
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.clean-disabled=true

# ==========================================
# Security / JWT Configuration
# ==========================================
bankmind.security.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS0yNTYtYml0LXNlY3JldC1rZXktZm9yLWJhbmttaW5kLWFpLWxvY2FsLWRldmVsb3BtZW50}
# 1 hour in milliseconds (3600000)
bankmind.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
# 24 hours in milliseconds (86400000)
bankmind.security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:86400000}

# ==========================================
# Qdrant Vector Database Configuration
# ==========================================
bankmind.qdrant.host=${QDRANT_HOST:localhost}
bankmind.qdrant.port=${QDRANT_PORT:6334}
bankmind.qdrant.api-key=${QDRANT_API_KEY:}

# ==========================================
# LangChain4j / OpenAI Configuration
# ==========================================
bankmind.langchain4j.openai.api-key=${OPENAI_API_KEY:mock-openai-key}
bankmind.langchain4j.openai.chat-model-name=${CHAT_MODEL_NAME:gpt-4o}
bankmind.langchain4j.openai.embedding-model-name=${EMBEDDING_MODEL_NAME:text-embedding-3-small-v1}

# ==========================================
# Embedding Service Provider Configuration
# ==========================================
bankmind.embedding.provider=${EMBEDDING_PROVIDER:MOCK}

# ==========================================
# Scheduling Configuration
# ==========================================
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=bankmind-sched-

management.endpoints.web.exposure.include=*
