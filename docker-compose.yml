version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bankmind-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-bankmind}
      MYSQL_USER: ${DB_USER:-bankmind_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bankmind_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankmind-network

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: bankmind-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - bankmind-network

volumes:
  mysql_data:
  qdrant_data:

networks:
  bankmind-network:
    driver: bridge
